services:
    redis:
        image: redis:7-alpine
        restart: unless-stopped
        command: ["redis-server", "--appendonly", "yes"]
        volumes:
            - redis-data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 5
            start_period: 5s

    api:
        build:
            context: .
            dockerfile: Dockerfile
        restart: unless-stopped
        init: true
        depends_on:
            redis:
                condition: service_healthy
        healthcheck:
            test:
                [
                    "CMD",
                    "node",
                    "-e",
                    "require('http').get('http://127.0.0.1:3000/health/live',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
                ]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 40s
        ports:
            - "${HOST_PORT:-5000}:${PORT:-3000}"
        environment:
            NODE_ENV: ${NODE_ENV:-production}
            PORT: ${PORT:-3000}
            MONGODB_URI: ${MONGODB_URI:?Set MONGODB_URI in .env to your Atlas connection string}
            JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env or the environment}
            JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
            BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
            REDIS_URL: ${REDIS_URL:-redis://redis:6379}

volumes:
    redis-data:
